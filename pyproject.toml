[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "aiver"
version = "0.1.0"
description = "AI Behavior Versioning - Git for AI behavior."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "typer>=0.12",
    "rich>=13",
    "numpy>=1.26",
    "pyyaml>=6",
]

[project.optional-dependencies]
openai = ["openai>=1.40"]
local = ["sentence-transformers>=2.7"]

[project.scripts]
aiver = "aiver.cli:main"

[tool.setuptools]
packages = ["aiver"]
