name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests
        run: python -m pytest -q

  mcp:
    name: mcp extra (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (editable + dev + mcp)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,mcp]
      - name: Run MCP tests
        run: python -m pytest -q tests/test_mcp.py

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: Ruff check
        run: ruff check dow tests

  security:
    name: bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (project + scanners)
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -e .
      - name: Bandit (static security scan)
        run: bandit -r dow -c pyproject.toml
      - name: pip-audit (dependency CVEs)
        run: pip-audit --progress-spinner off
