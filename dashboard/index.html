<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta
      name="description"
      content="Drift Observation Workbench — version AI behavior, measure semantic drift and stability, and catch regressions across runs."
    />
    <meta name="theme-color" content="#f6f3ec" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0c11" media="(prefers-color-scheme: dark)" />
    <title>dow · Drift Observation Workbench</title>

    <!-- Preconnect + distinctive editorial font pairing: Fraunces (display serif) / Space Grotesk (UI) / JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Set theme before paint to avoid a flash. Defaults to the distinctive light theme unless the user chose dark. -->
    <script>
      try {
        if (localStorage.getItem('dow-theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {
        /* localStorage unavailable — fall back to default light theme */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
